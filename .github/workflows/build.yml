name: Build

on:
  push:
    paths:
    - .github/workflows/build.yml
    - BeatSaberMarkupLanguage/**
    - BeatSaberMarkupLanguage.sln

jobs:
  build:
    name: BeatSaberMarkupLanguage
    runs-on: windows-latest
    strategy:
      matrix:
        configuration:
        - Latest
        - '1.29.0'
    steps:
    - name: Check out
      uses: actions/checkout@v3

    - name: Set up environment
      run: ${{ github.workspace }}\.github\workflows\set_up_env.ps1 '${{ github.workspace }}\BeatSaberMarkupLanguage' '${{ matrix.configuration }}'

    - name: Fetch Beat Saber Bindings
      run: git clone https://${{ secrets.BEAT_SABER_BINDINGS_TOKEN }}@github.com/nicoco007/BeatSaberBindings --branch v${{ env.GAME_VERSION }} --single-branch '${{ runner.temp }}\BeatSaberBindings\Beat Saber_Data\Managed'

    - name: Download dependencies
      uses: nicoco007/download-beatmods-deps@main
      with:
        manifest: ${{ env.MANIFEST_PATH }}
        path: ${{ runner.temp }}\BeatSaberBindings

    - name: Add NuGet source
      run: dotnet nuget update source "nicoco007 GH Packages" --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

    - id: build-debug
      name: Build Debug
      run: dotnet publish ${{ github.workspace }}\BeatSaberMarkupLanguage\BeatSaberMarkupLanguage.csproj -c 'Debug ${{ matrix.configuration }}' -p:BeatSaberDir=${{ runner.temp }}\BeatSaberBindings

    - name: Upload Debug
      uses: actions/upload-artifact@v3
      with:
        name: BeatSaberMarkupLanguage-bs${{ env.GAME_VERSION }}-${{ env.ZIP_VERSION }}-DEBUG
        path: ${{ steps.build-debug.outputs.artifactpath }}

    - id: build-release
      name: Build Release
      run: dotnet publish ${{ github.workspace }}\BeatSaberMarkupLanguage\BeatSaberMarkupLanguage.csproj -c 'Release ${{ matrix.configuration }}' -p:BeatSaberDir=${{ runner.temp }}\BeatSaberBindings

    - name: Upload Release
      uses: actions/upload-artifact@v3
      with:
        name: BeatSaberMarkupLanguage-bs${{ env.GAME_VERSION }}-${{ env.ZIP_VERSION }}-RELEASE
        path: ${{ steps.build-release.outputs.artifactpath }}
